name: qiviz
description: A modern social application for international students.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Theming
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  glassmorphism: ^3.0.0
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  flutter_card_swiper: ^2.0.3
  video_player: ^2.8.2
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.1

  # Backend
  supabase_flutter: ^2.5.4

  # Utils
  geolocator: ^11.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  uuid: ^4.4.0
  intl: ^0.19.0
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
